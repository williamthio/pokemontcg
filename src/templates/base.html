<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Pokémon TCG Analysis{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #131316;
            --accent-primary: #7c3aed;
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.08), transparent 25%);
            background-attachment: fixed;
        }
        .data-font { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: rgba(19, 19, 22, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .neon-text { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .gradient-text {
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .table-row-hover { transition: all 0.2s ease; }
        .table-row-hover:hover {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.1) 0%, transparent 100%);
            transform: translateX(4px);
            border-left: 2px solid var(--accent-primary);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased pb-20">
    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center font-bold text-lg">TCG</div>
                    <span class="text-xl font-black tracking-tight gradient-text">Pokémon Meta Analytics</span>
                </a>
            </div>
            <div class="flex gap-6 text-sm font-medium text-slate-400">
                <a href="index.html" class="text-white">Top Decks</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 mt-12 w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Card Preview -->
    <div id="global-preview" class="fixed hidden z-[100] pointer-events-none rounded-xl shadow-2xl transition-opacity duration-150 opacity-0 bg-black/80 backdrop-blur-sm p-1 border border-white/10" style="width: 320px;">
        <img id="global-preview-img" class="w-full rounded-lg" src="" alt="Card Preview">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const preview = document.getElementById('global-preview');
            const previewImg = document.getElementById('global-preview-img');
            
            document.querySelectorAll('.card-preview-trigger').forEach(trigger => {
                trigger.addEventListener('mouseenter', (e) => {
                    const imgUrl = e.target.dataset.image;
                    const fallbackUrl = e.target.dataset.fallback;
                    
                    previewImg.src = imgUrl;
                    previewImg.onerror = () => { 
                        if(previewImg.src !== fallbackUrl) {
                            previewImg.src = fallbackUrl; 
                        }
                    };
                    
                    preview.style.display = 'block';
                    setTimeout(() => preview.classList.remove('opacity-0'), 10);
                    
                    const rect = e.target.getBoundingClientRect();
                    const previewHeight = 446; // Approx height of standard pokemon card at 320px width
                    
                    let top = rect.top - (previewHeight / 2) + (rect.height / 2);
                    top = Math.max(20, Math.min(top, window.innerHeight - previewHeight - 20));
                    
                    let left = rect.right + 20;
                    if (left + 320 > window.innerWidth) {
                        left = rect.left - 320 - 20;
                    }
                    
                    preview.style.top = `${top}px`;
                    preview.style.left = `${left}px`;
                });
                
                trigger.addEventListener('mouseleave', () => {
                    preview.classList.add('opacity-0');
                    setTimeout(() => {
                        if(preview.classList.contains('opacity-0')) preview.style.display = 'none';
                    }, 150);
                });
            });
        });
    </script>
</body>
</html>
