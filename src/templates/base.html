<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokémon TCG Deck Analytics{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --accent-primary: #3b82f6;
            --accent-secondary: #0ea5e9;
        }
        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6, .heading-font {
            font-family: 'Outfit', sans-serif;
        }
        .data-font {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-radius: 1rem;
        }
        .table-row-hover:hover {
            background-color: rgba(241, 245, 249, 0.6);
        }
        .badge-jp {
            background: linear-gradient(135deg, #fef08a 0%, #facc15 100%);
            color: #854d0e;
        }
        .accent-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12 md:pb-24">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold heading-font text-lg shadow-md group-hover:shadow-lg transition-all">
                    TCG
                </div>
                <span class="text-xl font-bold heading-font text-slate-800 tracking-tight group-hover:opacity-80 transition-opacity">Meta<span class="text-indigo-600">Analyzer</span></span>
            </a>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex items-center bg-slate-100 px-3 py-1 rounded-full text-xs font-medium text-slate-600 border border-slate-200">
                    Source: Limitless TCG (JP)
                </div>
                <a href="index.html" class="text-sm font-semibold text-slate-600 hover:text-indigo-600 transition-colors">Dashboard</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 md:mt-12 w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Card Preview -->
    <div id="global-preview" class="fixed hidden z-[100] pointer-events-none rounded-xl shadow-2xl transition-all duration-200 opacity-0 bg-white p-1.5 border border-slate-200" style="width: 280px;">
        <div class="relative w-full aspect-[2.5/3.5] bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center">
             <img id="global-preview-img" class="w-full h-full object-contain" src="" alt="Card Preview">
             <div id="preview-loader" class="absolute inset-0 flex items-center justify-center bg-white/80">
                 <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
             </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const preview = document.getElementById('global-preview');
            const previewImg = document.getElementById('global-preview-img');
            const loader = document.getElementById('preview-loader');
            
            // Adjust preview width for larger screens
            if(window.innerWidth >= 640) {
                preview.style.width = '320px';
            }
            
            document.querySelectorAll('.card-preview-trigger').forEach(trigger => {
                trigger.addEventListener('mouseenter', (e) => {
                    // Disable hover images on mobile devices
                    if (window.matchMedia("(pointer: coarse)").matches || window.innerWidth < 768) return;

                    const imgUrl = e.target.dataset.image;
                    const fallbackUrl = e.target.dataset.fallback;
                    
                    loader.style.display = 'flex';
                    previewImg.src = imgUrl;
                    
                    previewImg.onload = () => { loader.style.display = 'none'; };
                    previewImg.onerror = () => { 
                        if(previewImg.src !== fallbackUrl) {
                            previewImg.src = fallbackUrl; 
                        } else {
                            loader.style.display = 'none';
                        }
                    };
                    
                    preview.style.display = 'block';
                    setTimeout(() => {
                        preview.classList.remove('opacity-0');
                        preview.style.transform = 'scale(1) translateY(0)';
                    }, 10);
                    
                    const rect = e.target.getBoundingClientRect();
                    const previewHeight = window.innerWidth >= 640 ? 446 : 392; // Approximate heights based on width aspect ratio
                    const previewWidth = window.innerWidth >= 640 ? 320 : 280;
                    
                    let top = rect.top - (previewHeight / 2) + (rect.height / 2);
                    top = Math.max(20, Math.min(top, window.innerHeight - previewHeight - 20));
                    
                    let left = rect.right + 24;
                    if (left + previewWidth > window.innerWidth) {
                        left = rect.left - previewWidth - 24;
                    }
                    
                    preview.style.top = `${top}px`;
                    preview.style.left = `${left}px`;
                });
                
                trigger.addEventListener('mouseleave', () => {
                    preview.classList.add('opacity-0');
                    preview.style.transform = 'scale(0.95) translateY(10px)';
                    setTimeout(() => {
                        if(preview.classList.contains('opacity-0')) preview.style.display = 'none';
                    }, 200);
                });
            });
        });
    </script>
</body>
</html>
